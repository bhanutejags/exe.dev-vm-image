name: Build & publish image

# Builds the custom exe.dev image and pushes it to GitHub Container Registry.
#
# Each architecture is built on a NATIVE GitHub-hosted runner (amd64 on
# ubuntu-24.04, arm64 on ubuntu-24.04-arm) — no QEMU emulation, so the arm64
# leg is fast. Each leg pushes a single-arch image by digest; a final `merge`
# job stitches the per-arch digests into a multi-arch manifest list and applies
# the user-facing tags (:latest, :sha-..., dated).
#
# Triggers:
#   - push to the default branch touching the image definition (e.g. a merged
#     Dependabot PR bumping the exeuntu base digest) -> publish :latest
#   - manual dispatch
#   - weekly schedule -> rebuild so the GitHub-release tools baked in
#     (jj/mise/chezmoi/zellij/yazi/btm/eza/starship/nu, resolved at build time)
#     stay fresh and we pick up any new layers from the pinned base.
#   - pull requests -> build only (no push) as a smoke test
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-publish.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:
  schedule:
    # 07:00 UTC every Monday.
    - cron: "0 7 * * 1"

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare platform tag
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Don't push on pull_request events (forks can't write packages anyway).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          # Pass the workflow token to the build so the in-Dockerfile GitHub API
          # calls (resolving latest tool versions) aren't rate-limited. Mounted
          # as a BuildKit secret, never written into an image layer. Only passed
          # on trusted (non-PR) events; the Dockerfile falls back to the
          # unauthenticated API when the secret is absent, so fork PRs never see
          # the token.
          secrets: |
            github_token=${{ github.event_name != 'pull_request' && secrets.GITHUB_TOKEN || '' }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge manifests & push tags
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"

  cleanup:
    name: prune untagged versions
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: [merge]
    permissions:
      packages: write
    steps:
      # push-by-digest leaves orphaned per-arch manifests in GHCR once a tag
      # moves. Prune untagged versions that are NOT referenced by any tagged
      # manifest list (multi-arch children of a live tag are kept). First-party
      # only: gh + docker CLI. Janitorial, so never fail the publish.
      #
      # GITHUB_TOKEN can manage org/repo-scoped packages; user-owned packages
      # usually need a PAT with `delete:packages` (set GHCR_CLEANUP_PAT). If
      # neither has access the gh calls 403 and the step is skipped harmlessly.
      - name: Prune orphaned untagged versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: exe.dev-vm-image
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

          api="/users/${OWNER}/packages/container/${PACKAGE}/versions"
          versions="$(gh api --paginate "${api}" \
            -q '.[] | "\(.id) \(.name) \(.metadata.container.tags | length)"')"

          # Digests reachable from a tag: the tagged manifest itself + any
          # multi-arch children it references. These must never be deleted.
          referenced=""
          while read -r id digest tags; do
            [ "${tags}" -gt 0 ] || continue
            referenced+="${digest}"$'\n'
            referenced+="$(docker buildx imagetools inspect --raw "${IMAGE}@${digest}" \
              | jq -r '.manifests[]?.digest' 2>/dev/null || true)"$'\n'
          done <<< "${versions}"

          # Delete untagged versions absent from the referenced set.
          while read -r id digest tags; do
            [ "${tags}" -eq 0 ] || continue
            if grep -qxF "${digest}" <<< "${referenced}"; then
              echo "keep   ${digest} (referenced)"
            else
              echo "delete ${digest} (orphan, id ${id})"
              gh api -X DELETE "${api}/${id}"
            fi
          done <<< "${versions}"
